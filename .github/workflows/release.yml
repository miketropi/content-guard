name: Create Release

on:
  push:
    tags:
      - 'v*' # e.g. v1.0.0, v1.2.3

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create plugin ZIP
        run: |
          git archive --format=zip --prefix=content-guard/ -o "content-guard-${{ github.ref_name }}.zip" HEAD
          ls -lh "content-guard-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: content-guard-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
