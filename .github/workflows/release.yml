name: Create Release

on:
  push:
    tags:
      - 'v*'   # trigger when pushing tags like v1.0.0, v1.2.3, ...

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create ZIP
        run: |
          zip -r release.zip . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude ".github/*" \
            --exclude "*.env*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}